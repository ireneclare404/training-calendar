<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Training Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:720px;margin:0 auto;padding:20px 16px 32px;background:#F5F3EE;color:#1f1e1d;zoom:1.2}
body.lang-cn{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif}
body.lang-jp{font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif}
h1{font-family:Georgia,"Times New Roman",serif;font-size:26px;font-weight:600;margin:0;letter-spacing:.2px}
h2{font-family:Georgia,serif;font-size:18px;font-weight:600;margin:18px 0 6px}
body.lang-cn h1,body.lang-cn h2,body.lang-cn #mtitle{font-family:Georgia,"Songti SC","SimSun",serif}
body.lang-jp h1,body.lang-jp h2,body.lang-jp #mtitle{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Sans JP",serif}
.sub{color:#8a857b;font-size:13px;margin:4px 0 18px}
.sub a{color:#C96442;text-decoration:none}
.sub a:hover{text-decoration:underline}
button{font:inherit;font-size:14px;padding:8px 12px;border:1px solid #ddd8cc;border-radius:9px;background:#fff;cursor:pointer;color:#1f1e1d;transition:background .15s,border-color .15s,color .15s}
button:hover{background:#efece4;border-color:#c9c3b4}
button.active{background:#C96442;color:#fff;border-color:#C96442}
button.pclosed{background:#faf3ef;color:#C96442;border-color:#C96442}
button.pclosed:hover{background:#f5e8e1}
button.popen{background:#1f1e1d;color:#fff;border-color:#1f1e1d}
button.popen:hover{background:#3a3835;border-color:#3a3835}
input,select{font:inherit;font-size:14px;padding:9px;border:1px solid #ddd8cc;border-radius:9px;background:#fff;box-sizing:border-box;color:#1f1e1d}
input:focus,select:focus{outline:none;border-color:#C96442;box-shadow:0 0 0 3px rgba(201,100,66,.15)}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.nav{display:flex;align-items:center;justify-content:space-between;margin:6px 0 12px}
.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:10px}
.wd{text-align:center;font-size:12px;color:#8a857b;padding:2px 0;letter-spacing:.5px}
.cell{aspect-ratio:4/3;border-radius:10px;padding:4px 3px;cursor:pointer;border:1px solid #e8e4da;background:#fff;transition:border-color .15s}
.cell:hover{border-color:#c9c3b4}
.cell.sel{border-color:#C96442;background:#faf3ef}
.dnum{font-size:11px;text-align:center;margin-bottom:2px;color:#8a857b}
.dnum.today{color:#C96442;font-weight:600}
.dots{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center}
.dot{border-radius:50%;opacity:.7;transition:opacity .15s,transform .15s;display:inline-block}
.dot:hover{opacity:1;transform:scale(1.06)}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#5f5b52}
.chip i{width:10px;height:10px;border-radius:50%;display:inline-block;opacity:.85}
.card{background:#fff;border:1px solid #e8e4da;border-radius:14px;padding:18px;margin:0 0 18px}
.cardtitle{font-weight:600;font-size:14px;margin:0 0 12px;letter-spacing:.2px}
.row{display:flex;gap:8px;margin-bottom:8px}
.row>*{flex:1;min-width:0}
.entry{display:flex;align-items:center;gap:9px;padding:9px 4px;border-top:1px solid #eeeae0;font-size:14px}
.entry i{width:12px;height:12px;border-radius:50%;flex:none;display:inline-block;opacity:.85}
.muted{color:#8a857b;font-size:13px}
.err{color:#a32d2d;font-size:12px;margin:6px 0 0}
.primary{background:#C96442;color:#fff;border-color:#C96442}
.primary:hover{background:#b5583a;border-color:#b5583a}
.bars{display:flex;align-items:flex-end;gap:2px;height:170px;margin-top:12px}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;min-width:0}
.bar div{width:100%;opacity:.85;transition:opacity .15s}
.bar:hover div{opacity:1}
.xlabels{display:flex;gap:2px;margin-top:5px}
.xlabels span{flex:1;font-size:10px;color:#8a857b;text-align:center;overflow:hidden;white-space:nowrap}
#tip{position:absolute;display:none;background:#2c2a26;color:#f5f3ee;font-size:12px;line-height:1.5;padding:8px 11px;border-radius:8px;max-width:260px;white-space:pre-line;pointer-events:none;z-index:99;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.setrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #eeeae0;font-size:14px;flex-wrap:wrap}
.setrow input[type=number]{width:76px;padding:6px}
.setrow input[type=text]{flex:1;min-width:120px;padding:6px}
.setrow .small{font-size:12px;padding:5px 9px}
.archived{opacity:.45}
.tag{font-size:11px;color:#8a857b;border:1px solid #ddd8cc;border-radius:6px;padding:1px 6px}
.reftable{width:100%;font-size:13px;border-collapse:collapse;margin-top:8px}
.reftable td{padding:4px 6px;border-top:1px solid #eeeae0}
.reftable td:last-child{text-align:right;color:#5f5b52}
.swatches{display:inline-flex;gap:5px;align-items:center;flex:none}
.sw{width:18px;height:18px;border-radius:50%;cursor:pointer;opacity:.55;border:2px solid transparent;box-sizing:border-box}
.sw.on{opacity:1;border-color:#1f1e1d}
#about p{font-size:14px;line-height:1.7;margin:0 0 10px}
.cell:focus-visible,.dot:focus-visible,.bar:focus-visible{outline:3px solid rgba(201,100,66,.35);outline-offset:2px}
.dot[role=button]{cursor:pointer}
.entryactions{display:flex;gap:6px;flex:none}
.entryactions button{width:auto;padding:6px 9px}
.detailfilter{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 0 8px;padding:8px 10px;background:#faf3ef;border:1px solid #ead4ca;border-radius:9px;font-size:12px}
.undo{display:none;align-items:center;justify-content:space-between;gap:10px;margin:0 0 14px;padding:10px 12px;background:#2c2a26;color:#f5f3ee;border-radius:10px;font-size:13px}
.undo button{padding:5px 10px}
.status{min-height:18px;margin:6px 0 0}
@media (max-width:560px){
body{zoom:1;padding:12px 8px 24px}
.card{padding:12px}
.grid{gap:3px}
.cell{aspect-ratio:1/1;border-radius:7px;padding:2px 1px}
.dnum{font-size:10px;margin-bottom:1px}
.dots{gap:2px}
.topbar{flex-wrap:wrap}
.bars{height:120px}
#tip{max-width:200px}
.setrow input[type=text]{min-width:90px}
}
</style>
</head>
<body>
<div class="topbar">
<div>
<h1 id="apptitle"></h1>
<p class="sub"><span id="appsub"></span> <a href="#" id="aboutlink"></a></p>
</div>
<div style="display:flex;gap:8px;flex:none">
<span id="langbtns" style="display:inline-flex;gap:8px"></span>
<button id="settingsbtn" class="pclosed"></button>
</div>
</div>
<div class="card" id="about" style="display:none">
<div id="aboutbody"></div>
<button id="aboutback" style="margin-top:8px"></button>
</div>
<div id="main">
<div class="card" id="settings" style="display:none">
<p class="muted" id="l_slots" style="margin:0 0 2px"></p>
<p class="muted" id="l_slothint" style="margin:0 0 6px;font-size:12px"></p>
<div id="slotrows" style="margin-bottom:16px"></div>
<div style="display:flex;gap:6px;margin-bottom:14px">
<button id="tabdur" class="active" style="font-size:13px;padding:6px 12px"></button>
<button id="tabreps" style="font-size:13px;padding:6px 12px"></button>
</div>
<div id="pane_dur">
<p class="muted" id="l_catlist" style="margin:0 0 2px"></p>
<p class="muted" id="l_cathint" style="margin:0 0 6px;font-size:12px"></p>
<div id="catrows"></div>
<div class="setrow" style="border-top:none;margin-top:6px">
<input type="text" id="newcatname">
<input type="number" id="newcatmult" min="0.5" step="0.5" style="width:76px">
<span class="muted" id="l_newmult"></span>
<span class="swatches" id="newcatsw"></span>
<button class="small" id="newcatadd"></button>
</div>
<p class="muted" id="l_refdur" style="margin:18px 0 2px"></p>
<p class="muted effortnote" style="margin:4px 0 8px;font-size:12px"></p>
<table class="reftable" id="refdurtable"></table>
</div>
<div id="pane_reps" style="display:none">
<p class="muted" id="l_exlist" style="margin:0 0 2px"></p>
<p class="muted" id="l_archhint" style="margin:0 0 6px;font-size:12px"></p>
<div id="exrows"></div>
<div class="setrow" style="border-top:none;margin-top:6px">
<input type="text" id="newexname">
<input type="number" id="newexpts" min="0.05" step="0.05" style="width:76px">
<span class="muted" id="l_newpts"></span>
<span class="swatches" id="newexsw"></span>
<button class="small" id="newexadd"></button>
</div>
<p class="muted" id="l_refreps" style="margin:18px 0 2px"></p>
<p class="muted effortnote" style="margin:4px 0 8px;font-size:12px"></p>
<table class="reftable" id="refrepstable"></table>
</div>
</div>
<div class="card" id="addcard">
<p class="cardtitle" id="l_addsession"></p>
<div class="row"><input type="date" id="fdate"><select id="ftype"></select></div>
<div id="fields"></div>
<button id="fadd" class="primary" style="width:100%"></button>
<button id="fcancel" style="width:100%;margin-top:7px;display:none"></button>
<p class="err" id="ferr" aria-live="polite"></p>
</div>
<div class="nav">
<button id="prev">&#8592;</button>
<span id="mtitle" style="font-weight:600;font-size:17px;font-family:Georgia,serif"></span>
<button id="next">&#8594;</button>
</div>
<div class="grid" id="grid"></div>
<div class="legend" id="legend"></div>
<p class="muted" id="mtotal"></p>
<div id="daylist" style="margin:6px 0 18px"></div>
<div class="card">
<div style="display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap">
<p class="cardtitle" id="l_volchart" style="margin:0"></p>
<div style="display:flex;gap:6px">
<button id="vday" class="active" style="font-size:13px;padding:6px 10px"></button>
<button id="vweek" style="font-size:13px;padding:6px 10px"></button>
<button id="vmonth" style="font-size:13px;padding:6px 10px"></button>
</div>
</div>
<p class="muted" id="chartmax" style="margin:10px 0 0"></p>
<div class="bars" id="bars"></div>
<div class="xlabels" id="xlabels"></div>
</div>
<div id="undo" class="undo" aria-live="polite"><span id="undotext"></span><button id="fundobutton"></button></div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button id="freport"></button>
<button id="fexport"></button>
<button id="fbackup"></button>
<button id="fimport"></button>
<input id="fimportfile" type="file" accept="application/json,.json" style="display:none">
</div>
<p class="muted status" id="backupstatus" aria-live="polite"></p>
</div>
<div id="tip"></div>

about:'<h2>Why this exists</h2><p>Most training apps decide for you what counts as exercise. This one doesn\'t. You define the categories, the intensities, and the colors — no bending your life to fit someone else\'s training menu. The effort that appears on no menu at all, but that you value, deserves a sticker too.</p><h2>How it works</h2><p><b>Points.</b> Everything converts to one simple scale: 1 point = 1 minute lying at rest. A 10x category earns 10 points per minute. The score is saved the moment you log an entry, so changing your settings later never rewrites your history.</p><p><b>What points are.</b> A personal comparison tool — not calories, not a medical measurement. They let very different activities sit on one calendar.</p><p><b>Everyone is different.</b> The same move costs different people different effort, so the reference tables give ranges instead of single numbers. Pick within the range by how hard it honestly feels for you.</p><p><b>Categories.</b> Each has a name, a multiplier, and a color — all editable in Personalize. If one session mixes intensities, make two categories and log two entries.</p><p><b>Stickers.</b> Entries of the same color on one day merge into one dot, and the dot\'s area matches its points: small effort, small dot; big day, big dot. Hover or tap a dot to see what\'s inside.</p><p><b>Bodyweight.</b> Rep-based moves are scored per rep, each with its own editable value. Defaults are calibrated so a full session (10 pull-ups, 50 push-ups, 50 jump squats, 100 sit-ups) = 300 points — the same as 30 minutes at 10x.</p><p><b>Your data.</b> Everything stays in your own browser; nothing is uploaded. CSV exports are for analysis; the complete backup saves records and settings together and can be imported back anytime.</p>'},

about:'<h2>为什么做这个</h2><p>大多数训练应用替你决定什么算运动，这个网站不这么做。类别、强度、颜色都由你定义，不需要把自己的生活折中成任何现成的训练方案。那些不在任何训练菜单上、但你自己珍视的付出，同样值得一张贴纸。</p><h2>如何使用</h2><p><b>点数。</b>一切换算到同一把简单的尺子：1点 = 静躺1分钟。10x 的类别每分钟得10点。分数在录入那一刻就被保存，之后修改设置不会改写历史。</p><p><b>点数是什么。</b>它是你个人的比较工具——不是卡路里，也不是医学指标。它的作用是让天差地别的活动能放在同一本日历上。</p><p><b>人人不同。</b>同一个动作对不同的人费力程度不同，所以参考表给的是范围而不是单一数字。按你真实的费力感在范围内选就好。</p><p><b>类别。</b>每个类别有名称、倍数和颜色，都在"个性化"里改。一次训练里有不同强度，就建两个类别分开录两条。</p><p><b>贴纸。</b>同一天同色的记录合并成一个圆点，圆点面积和点数成正比：小付出是小点，大日子是大点。悬停或轻点圆点可以看到里面有什么。</p><p><b>自重。</b>按次数计的动作以"每次多少点"计分，每个动作的分值都可以改。默认校准为一整套（10个引体、50个俯卧撑、50个深蹲跳、100个仰卧起坐）等于300点，相当于30分钟的10x活动。</p><p><b>你的数据。</b>全部存在你自己的浏览器里，不会上传。CSV 适合做分析；完整备份把记录和设置存在一起，随时可以导入恢复。</p>'},

about:'<h2>なぜ作ったか</h2><p>多くのトレーニングアプリは「何が運動か」を勝手に決めます。このサイトは決めません。カテゴリも強度も色も、あなたが定義します。既存のトレーニングメニューに自分を合わせる必要はありません。どのメニューにも載っていない、でもあなたが大切にしている努力にも、ステッカーを。</p><h2>使い方</h2><p><b>点数。</b>すべてを一つのシンプルな尺度に換算します：1点 = 安静に1分。10xのカテゴリは1分につき10点。点数は記録した瞬間に保存されるので、後から設定を変えても過去は書き換わりません。</p><p><b>点数とは。</b>個人的な比較の道具です。カロリーでも医学的な測定でもありません。まったく違う活動を一つのカレンダーに並べるためのものです。</p><p><b>人それぞれ。</b>同じ動作でも必要な努力は人によって違うため、参考表は単一の数値ではなく範囲で示しています。自分の正直な体感に合わせて範囲内で選んでください。</p><p><b>カテゴリ。</b>それぞれに名前・倍率・色があり、「カスタマイズ」で自由に編集できます。強度が混在するセッションはカテゴリを2つ作って2件記録します。</p><p><b>ステッカー。</b>同じ日の同色記録は1つの点にまとまり、面積は点数に比例します。小さな努力は小さく、大きな一日は大きく。ホバーまたはタップで中身が見えます。</p><p><b>自重。</b>回数ベースの種目は1回あたりの点数で計算し、値は自由に編集できます。初期設定ではフルセッション（懸垂10回・腕立て50回・ジャンプスクワット50回・シットアップ100回）＝300点＝10x活動30分ぶんです。</p><p><b>データ。</b>すべてあなたのブラウザ内に保存され、アップロードされません。CSVは分析用、完全バックアップは記録と設定をまとめて保存し、いつでも読み込んで復元できます。</p>'}};

function clone(v){return JSON.parse(JSON.stringify(v));}
function isNum(v){return typeof v==="number"&&isFinite(v);}
function uid(prefix){
if(window.crypto&&typeof window.crypto.randomUUID==="function")return prefix+"_"+window.crypto.randomUUID();
return prefix+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,10);}
function ensureOrder(arr){var mx=0;arr.forEach(function(x){if(x.o&&x.o>mx)mx=x.o;});arr.forEach(function(x){if(!x.o){mx++;x.o=mx;}});}
function nextOrder(arr){var mx=0;arr.forEach(function(x){if(x.o&&x.o>mx)mx=x.o;});return mx+1;}
function ensureIds(arr,prefix){var seen={};arr.forEach(function(x){if(!x.id||seen[x.id])x.id=uid(prefix);seen[x.id]=true;});}
function ensureConfig(){
if(!cfg||typeof cfg!=="object")cfg={};
if(!cfg.lang||LANGS.indexOf(cfg.lang)<0)cfg.lang="en";
if(!cfg.slots||typeof cfg.slots!=="object")cfg.slots={};
SLOTKEYS.forEach(function(k){if(!cfg.slots[k]||typeof cfg.slots[k]!=="object")cfg.slots[k]={name:""};if(typeof cfg.slots[k].name!=="string")cfg.slots[k].name="";});
if(!Array.isArray(cfg.ex))cfg.ex=clone(DEFAULTEX);
if(!Array.isArray(cfg.cats)){
var m=cfg.mult;
if(m){
cfg.cats=[
{n:"Intensive training session",m:m.spar,c:"red",a:false},
{n:"Normal training session",m:m.nonspar,c:"red",a:false},
{n:"Running",m:m.run,c:"blue",a:false},
{n:"Other — high effort",m:m.hi,c:"yellow",a:false},
{n:"Other — low effort",m:m.lo,c:"green",a:false}];
(cfg.durEx||[]).forEach(function(e){for(var i=0;i<cfg.cats.length;i++){if(cfg.cats[i].n===e.n)return;}cfg.cats.push({n:e.n,m:e.m,c:e.c||"green",a:!!e.a});});
delete cfg.mult;delete cfg.durEx;
}else cfg.cats=clone(DEFAULTCATS);
}
cfg.cats=cfg.cats.filter(function(c){return c&&typeof c==="object";});
cfg.ex=cfg.ex.filter(function(e){return e&&typeof e==="object";});
cfg.cats.forEach(function(c){if(typeof c.n!=="string"||!c.n.trim())c.n="Unnamed category";c.n=c.n.trim();if(!isNum(c.m)||c.m<=0)c.m=1;if(SLOTKEYS.indexOf(c.c)<0)c.c="green";c.a=!!c.a;});
cfg.ex.forEach(function(e){if(typeof e.n!=="string"||!e.n.trim())e.n="Unnamed exercise";e.n=e.n.trim();if(!isNum(e.p)||e.p<=0)e.p=1;if(SLOTKEYS.indexOf(e.c)<0)e.c="purple";e.a=!!e.a;});
ensureIds(cfg.cats,"cat");ensureIds(cfg.ex,"ex");ensureOrder(cfg.cats);ensureOrder(cfg.ex);
}
function sortList(arr,valKey){arr.sort(function(a,b){if((a.a?1:0)!==(b.a?1:0))return (a.a?1:0)-(b.a?1:0);var ca=SLOTKEYS.indexOf(a.c),cb=SLOTKEYS.indexOf(b.c);if(ca!==cb)return ca-cb;if(a[valKey]!==b[valKey])return b[valKey]-a[valKey];return a.o-b.o;});}
function resortCats(){ensureOrder(cfg.cats);sortList(cfg.cats,"m");}
function resortEx(){ensureOrder(cfg.ex);sortList(cfg.ex,"p");}
function catById(id){for(var i=0;i<cfg.cats.length;i++)if(cfg.cats[i].id===id)return cfg.cats[i];return null;}
function exById(id){for(var i=0;i<cfg.ex.length;i++)if(cfg.ex[i].id===id)return cfg.ex[i];return null;}
function catGet(name){for(var i=0;i<cfg.cats.length;i++)if(cfg.cats[i].n===name)return cfg.cats[i];return null;}
function exGet(name){for(var i=0;i<cfg.ex.length;i++)if(cfg.ex[i].n===name)return cfg.ex[i];return null;}
function migrateSessions(){
if(!Array.isArray(sessions))sessions=[];
var converted=[];
sessions.forEach(function(s){
if(!s||typeof s!=="object")return;
if(s.kind){converted.push(s);return;}
if(s.type==="Bodyweight"){converted.push({date:s.date,kind:"bw",ex:s.ex,amt:s.amt});return;}
if(s.type==="Combat"){
var sp=Number(s.spar)||0,total=Number(s.amt)||0;
if(sp>0)converted.push({date:s.date,kind:"dur",cat:"Intensive training session",amt:sp});
if(total-sp>0)converted.push({date:s.date,kind:"dur",cat:"Normal training session",amt:total-sp});
return;}
if(s.type==="Running"){converted.push({date:s.date,kind:"dur",cat:"Running",amt:s.amt});return;}
if(s.act){converted.push({date:s.date,kind:"dur",cat:s.act,amt:s.amt,note:s.note||""});return;}
converted.push({date:s.date,kind:"dur",cat:(s.lvl==="hi"?"Other — high effort":"Other — low effort"),amt:s.amt,note:s.note||""});
});
sessions=converted.map(function(s){
var amount=Number(s.amt);if(!isFinite(amount)||amount<=0)amount=1;
var base={id:(typeof s.id==="string"&&s.id)?s.id:uid("session"),date:(typeof s.date==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(s.date))?s.date:iso(new Date()),kind:s.kind==="bw"?"bw":"dur",amt:amount};
if(base.kind==="bw"){
var ex=exById(s.exId)||exGet(s.ex)||exGet(s.exName);
var rate=isNum(s.rate)&&s.rate>0?s.rate:(ex?ex.p:1);
base.exId=ex?ex.id:(s.exId||"");
base.exName=(typeof s.exName==="string"&&s.exName)||(typeof s.ex==="string"&&s.ex)||(ex?ex.n:"Deleted exercise");
base.rate=rate;base.points=isNum(s.points)?s.points:amount*rate;base.color=SLOTKEYS.indexOf(s.color)>=0?s.color:(ex?ex.c:"purple");
}else{
var cat=catById(s.catId)||catGet(s.cat)||catGet(s.catName);
var mult=isNum(s.rate)&&s.rate>0?s.rate:(cat?cat.m:1);
base.catId=cat?cat.id:(s.catId||"");
base.catName=(typeof s.catName==="string"&&s.catName)||(typeof s.cat==="string"&&s.cat)||(cat?cat.n:"Deleted category");
base.rate=mult;base.points=isNum(s.points)?s.points:amount*mult;base.color=SLOTKEYS.indexOf(s.color)>=0?s.color:(cat?cat.c:"green");
if(typeof s.note==="string"&&s.note.trim())base.note=s.note.trim();
}
return base;
});
var used={};sessions.forEach(function(s){if(used[s.id])s.id=uid("session");used[s.id]=true;});
}

function T(k){var v=L[cfg.lang][k];return (v!==undefined&&v!==null)?v:L.en[k];}
function exName(n){var M=EXN[cfg.lang];return (M&&M[n])?M[n]:n;}
function refIdx(){return cfg.lang==="cn"?1:(cfg.lang==="jp"?2:0);}
function slotLabel(k){return (cfg.slots[k]&&cfg.slots[k].name)?cfg.slots[k].name:L[cfg.lang].ck[k];}
function sessionName(s){if(s.kind==="bw"){var e=exById(s.exId);return exName(e?e.n:s.exName);}var c=catById(s.catId);return c?c.n:s.catName;}
function pts(s){return isNum(s.points)?s.points:0;}
function ckey(s){if(s.kind==="bw"){var e=exById(s.exId);return e?e.c:(SLOTKEYS.indexOf(s.color)>=0?s.color:"purple");}var c=catById(s.catId);return c?c.c:(SLOTKEYS.indexOf(s.color)>=0?s.color:"green");}
function sdesc(s){if(s.kind==="bw")return sessionName(s)+" × "+s.amt;var base=sessionName(s)+" · "+s.amt+" min";if(s.note)base+=" — "+s.note;return base;}
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseDate(ds){var p=ds.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function mondayOf(d){var x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return x;}
function roundScore(v){return Math.round(v*100)/100;}
function dotMetrics(){
var g=document.getElementById("grid");
var w=(g&&g.clientWidth)?g.clientWidth:684;
var gap=(document.documentElement.clientWidth<=560)?3:6;
var cell=(w-gap*6)/7;
if(cell<28)cell=28;
var scale=Math.max(0.42,Math.min(1,cell/95));
return {scale:scale,cap:Math.round(cell*0.8)};
}
function dotSize(p){
var m=dotMetrics();
var base=Math.round(24*m.scale*Math.sqrt(p/300));
return Math.max(4,Math.min(Math.min(40,m.cap),base));
}

document.getElementById("fexport").addEventListener("click",function(){var rows=[["date","kind","detail","amount","saved_rate","points"]];sessions.forEach(function(s){rows.push([s.date,s.kind==="bw"?"bodyweight":"duration",sdesc(s),s.amt,s.rate,roundScore(pts(s))]);});dlCSV(rows,"training_log.csv");});
document.getElementById("freport").addEventListener("click",function(){var rows=[["date","type","item_id","name","amount","unit","saved_rate","saved_points","note"]],sorted=sessions.slice().sort(function(a,b){return a.date<b.date?-1:(a.date>b.date?1:0);});sorted.forEach(function(s){rows.push([s.date,s.kind==="bw"?"bodyweight":"duration",s.kind==="bw"?s.exId:s.catId,sessionName(s),s.amt,s.kind==="bw"?"reps":"min",s.rate,roundScore(pts(s)),s.note||""]);});dlCSV(rows,"training_report.csv");});
document.getElementById("fbackup").addEventListener("click",function(){var backup={app:"training-calendar",version:BACKUP_VERSION,exportedAt:new Date().toISOString(),settings:cfg,sessions:sessions};downloadBlob(JSON.stringify(backup,null,2),"application/json","training_calendar_backup_"+iso(new Date())+".json");document.getElementById("backupstatus").textContent=T("backupjson")+" ✓";});
document.getElementById("fimport").addEventListener("click",function(){document.getElementById("fimportfile").click();});
document.getElementById("fimportfile").addEventListener("change",function(){var file=this.files&&this.files[0],input=this;if(!file)return;var reader=new FileReader();reader.onload=function(){try{var data=JSON.parse(reader.result),newCfg=data.settings||data.cfg,newSessions=data.sessions;if(!data||data.app!=="training-calendar"||!newCfg||!Array.isArray(newSessions))throw new Error("invalid");if(!confirm(T("confirmimport")))return;cfg=clone(newCfg);sessions=clone(newSessions);ensureConfig();resortCats();resortEx();migrateSessions();saveCfg();saveAll();editingId=null;detailColor=null;panelOpen=false;aboutOpen=false;document.getElementById("settings").style.display="none";renderChrome();renderSettings();renderFields();render();document.getElementById("backupstatus").textContent=T("importok");}catch(e){document.getElementById("backupstatus").textContent=T("importerr");}finally{input.value="";}};reader.onerror=function(){document.getElementById("backupstatus").textContent=T("importerr");input.value="";};reader.readAsText(file);});
renderChrome();renderSettings();renderFields();render();
</script>
</body>
